<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>boom Payroll — India</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cg transform='rotate(-26 32 32)'%3E%3Cpath d='M8,32 A24,13 0 0 1 56,32' fill='none' stroke='%23F47C20' stroke-width='7' stroke-linecap='round'/%3E%3Cpath d='M56,32 A24,13 0 0 1 8,32' fill='none' stroke='%231660BE' stroke-width='7' stroke-linecap='round'/%3E%3C/g%3E%3Cpath d='M16,48 L41,25' fill='none' stroke='%231660BE' stroke-width='6' stroke-linecap='round'/%3E%3Cpath d='M48,18 L37,22 L43,31 Z' fill='%231660BE'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0B2547; --ink:#0E2440; --steel:#5A6B80; --steel-l:#8493A6;
    --line:#E3EAF2; --cloud:#F4F7FB; --cloud-2:#EAF1F8;
    --blue:#1660BE; --blue-d:#114E9C; --azure:#2BA6E8; --orange:#F47C20; --orange-d:#D9661A;
    --green:#1F9D6B; --green-bg:#E6F6EF; --red:#D8442F; --red-bg:#FCEBE8; --amber:#C98A12; --amber-bg:#FCF3E2;
    --r:14px; --ease:cubic-bezier(.2,.7,.2,1);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--cloud);color:var(--ink);font-size:11.2px;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif;margin:0;letter-spacing:-.01em}
  .mono{font-family:'IBM Plex Mono',monospace}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit}

  .app{display:grid;grid-template-columns:252px 1fr;min-height:100vh}
  .side{background:var(--navy);color:#fff;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
  .brand{display:flex;align-items:center;gap:10px;padding:20px 22px 16px}
  .brand .mk{width:38px;height:38px;flex:none}
  .brand .wm{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:17.6px;line-height:1;display:flex;align-items:baseline;gap:1px}
  .brand .wm .b{color:#fff}.brand .wm .p{color:var(--orange);font-size:12.8px}
  .side .reg{font-family:'IBM Plex Mono',monospace;font-size:7.6px;letter-spacing:.18em;color:rgba(255,255,255,.5);padding:0 24px 14px;text-transform:uppercase}
  .nav{display:flex;flex-direction:column;gap:3px;padding:6px 12px;flex:1}
  .nav a{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;color:rgba(255,255,255,.72);font-weight:500;font-size:11.2px;transition:background .15s,color .15s}
  .nav a:hover{background:rgba(255,255,255,.06);color:#fff}
  .nav a.active{background:linear-gradient(120deg,var(--blue),var(--azure));color:#fff}
  .nav a svg,.nav .grp>button svg.ic{width:18px;height:18px;flex:none}
  .nav .grp>button{display:flex;align-items:center;gap:11px;width:100%;background:none;border:0;color:rgba(255,255,255,.72);padding:10px 12px;border-radius:9px;font:inherit;font-weight:500;font-size:11.2px;text-align:left}
  .nav .grp>button:hover{background:rgba(255,255,255,.06);color:#fff}
  .nav .grp>button.has-active{color:#fff}
  .nav .grp>button .chev{margin-left:auto;width:14px;height:14px;transition:transform .2s}
  .nav .grp.open>button .chev{transform:rotate(90deg)}
  .nav .grp .sub{display:none;flex-direction:column;gap:2px;padding:2px 0 4px 30px}
  .nav .grp.open .sub{display:flex}
  .nav .grp .sub a{padding:8px 12px;font-size:10.4px;color:rgba(255,255,255,.6)}
  .nav .grp .sub a.active{background:linear-gradient(120deg,var(--blue),var(--azure));color:#fff}
  .side-foot{padding:14px 20px;border-top:1px solid rgba(255,255,255,.1);font-size:9.6px;color:rgba(255,255,255,.55)}
  .side-foot b{color:#fff;font-weight:600}

  .main{display:flex;flex-direction:column;min-width:0}
  .top{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
  .top .tt h1{font-size:16px}.top .tt p{margin:2px 0 0;color:var(--steel);font-size:10px}
  .top .actions{display:flex;align-items:center;gap:12px}
  .pill{font-family:'IBM Plex Mono',monospace;font-size:8.8px;background:var(--cloud);border:1px solid var(--line);border-radius:20px;padding:6px 12px;color:var(--steel);font-weight:600}
  .avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--azure));color:#fff;display:grid;place-items:center;font-weight:700;font-size:10.4px;font-family:'Space Grotesk'}
  .content{padding:26px 28px 60px;max-width:1300px}

  .btn{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:10.8px;padding:10px 16px;border-radius:9px;border:1px solid transparent;transition:transform .15s var(--ease),background .15s,box-shadow .2s}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:linear-gradient(120deg,var(--blue),var(--azure));color:#fff;box-shadow:0 8px 20px -10px rgba(22,96,190,.6)}
  .btn-orange{background:var(--orange);color:#fff}.btn-orange:hover{background:var(--orange-d)}
  .btn-ghost{background:#fff;border-color:var(--line);color:var(--ink)}.btn-ghost:hover{border-color:var(--blue);color:var(--blue)}
  .btn-sm{padding:7px 11px;font-size:10px}
  .btn svg{width:16px;height:16px}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:16px 18px}
  .kpi .l{font-size:9.6px;color:var(--steel);font-weight:500;display:flex;align-items:center;gap:7px}
  .kpi .l .ic{width:26px;height:26px;border-radius:8px;display:grid;place-items:center}
  .kpi .v{font-family:'Space Grotesk';font-weight:700;font-size:20px;margin-top:10px;letter-spacing:-.02em}
  .kpi .s{font-size:9.2px;color:var(--steel-l);margin-top:3px}
  .grid2{display:grid;grid-template-columns:1.5fr 1fr;gap:16px;margin-bottom:22px}
  .panel{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:20px}
  .panel.flush{padding:0;overflow:hidden}
  .panel h3{font-size:12px;font-weight:600;margin-bottom:2px}
  .panel .sub{color:var(--steel);font-size:9.6px;margin-bottom:16px}

  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:8.8px;text-transform:uppercase;letter-spacing:.06em;color:var(--steel-l);font-weight:600;padding:10px 12px;border-bottom:1px solid var(--line)}
  td{padding:12px;border-bottom:1px solid var(--line);font-size:10.8px}
  tr:last-child td{border-bottom:0}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  tbody tr:hover{background:var(--cloud)}
  .emp{display:flex;align-items:center;gap:11px}
  .emp .av{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:700;font-size:9.6px;font-family:'Space Grotesk';flex:none}
  .emp .nm{font-weight:600}.emp .rl{font-size:9.2px;color:var(--steel)}
  .tag{display:inline-block;font-size:8.8px;font-weight:600;padding:3px 9px;border-radius:20px}
  .tag.g{background:var(--green-bg);color:var(--green)}.tag.b{background:var(--cloud-2);color:var(--blue)}
  .tag.o{background:#FDEEDF;color:var(--orange-d)}.tag.r{background:var(--red-bg);color:var(--red)}.tag.a{background:var(--amber-bg);color:var(--amber)}
  .tfoot td{font-weight:700;background:var(--cloud);border-top:2px solid var(--line)}
  .row-between{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .sec-title{font-size:10.4px;font-weight:600;color:var(--steel);text-transform:uppercase;letter-spacing:.05em;margin:0 0 12px}

  .field{margin-bottom:14px}
  .field label{display:block;font-size:9.6px;font-weight:600;color:var(--steel);margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-size:11.2px;background:#fff;color:var(--ink)}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(22,96,190,.12)}
  .inwrap{position:relative}.inwrap .cur{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--steel);font-weight:600;pointer-events:none}.inwrap input{padding-left:26px!important}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
  .form-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 16px}
  .lop-in{width:64px;padding:6px 8px;border:1px solid var(--line);border-radius:7px;text-align:right;font-variant-numeric:tabular-nums}

  .legend{display:flex;flex-direction:column;gap:9px;font-size:10.4px}
  .legend .li{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .legend .dot{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:8px}

  .comp{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  .comp .c{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:18px;border-left:4px solid var(--blue)}
  .comp .c.o{border-left-color:var(--orange)}.comp .c.g{border-left-color:var(--green)}.comp .c.a{border-left-color:var(--amber)}
  .comp .c .h{display:flex;align-items:center;justify-content:space-between}
  .comp .c .nm{font-weight:700;font-family:'Space Grotesk';font-size:12px}
  .comp .c .amt{font-family:'Space Grotesk';font-weight:700;font-size:19.2px;margin:10px 0 2px}
  .comp .c .due{font-size:9.6px;color:var(--steel)}

  .req{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
  .req:last-child{border-bottom:0}
  .req .ri{font-size:9.6px;color:var(--steel)}

  .slip{background:#fff;border:1px solid var(--line);border-radius:var(--r);max-width:760px;overflow:hidden}
  .slip .sh{background:var(--navy);color:#fff;padding:20px 24px;display:flex;justify-content:space-between;align-items:center}
  .slip .sh .co{font-family:'Space Grotesk';font-weight:700;font-size:14.4px}.slip .sh .mo{font-size:9.6px;color:rgba(255,255,255,.7)}
  .slip .body{padding:22px 24px}
  .slip .who{display:flex;justify-content:space-between;flex-wrap:wrap;gap:14px;padding-bottom:16px;border-bottom:1px solid var(--line);margin-bottom:16px}
  .slip .who .f{font-size:9.6px;color:var(--steel)}.slip .who .f b{display:block;color:var(--ink);font-size:11.2px;font-weight:600;margin-top:2px}
  .slip .cols{display:grid;grid-template-columns:1fr 1fr;gap:24px}
  .slip .cols h4{font-size:9.6px;text-transform:uppercase;letter-spacing:.05em;color:var(--steel-l);margin-bottom:8px}
  .slip .ln{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--line);font-size:10.8px}
  .slip .ln.tot{font-weight:700;border-bottom:0;border-top:2px solid var(--line);margin-top:4px;padding-top:9px}
  .slip .net{margin-top:18px;background:var(--cloud-2);border-radius:10px;padding:16px 18px;display:flex;justify-content:space-between;align-items:center}
  .slip .net .nv{font-family:'Space Grotesk';font-weight:700;font-size:19.2px;color:var(--blue)}
  .slip .words{font-size:9.6px;color:var(--steel);margin-top:8px}
  .slip .foot{padding:14px 24px;border-top:1px solid var(--line);font-size:8.8px;color:var(--steel-l);display:flex;justify-content:space-between}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:10px;font-size:10.8px;font-weight:500;box-shadow:0 16px 40px -12px rgba(0,0,0,.5);opacity:0;transition:opacity .25s,transform .25s;z-index:50;display:flex;align-items:center;gap:9px}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast .dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
  .note{font-size:9.2px;color:var(--steel-l);margin-top:10px;line-height:1.5}
  .switch{position:relative;display:inline-block;width:42px;height:24px;flex:none}
  .switch input{opacity:0;width:0;height:0}
  .slider{position:absolute;inset:0;background:var(--line);border-radius:24px;transition:.2s}
  .slider:before{content:"";position:absolute;height:18px;width:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
  .switch input:checked + .slider{background:var(--blue)}
  .switch input:checked + .slider:before{transform:translateX(18px)}
  .drop{border:2px dashed var(--line);border-radius:12px;padding:24px;text-align:center;color:var(--steel);background:var(--cloud)}
  .drop b{color:var(--blue)}
  textarea.code{font-family:'IBM Plex Mono',monospace;font-size:10px;min-height:120px;resize:vertical}

  @media(max-width:960px){
    .app{grid-template-columns:1fr}
    .side{position:fixed;left:-262px;width:252px;z-index:60;transition:left .25s;box-shadow:0 0 40px rgba(0,0,0,.3)}
    .side.open{left:0}
    .kpis{grid-template-columns:1fr 1fr}.grid2,.comp{grid-template-columns:1fr}.form-grid,.form-grid3{grid-template-columns:1fr}
    .menu-toggle{display:inline-flex!important}
  }
  .menu-toggle{display:none;background:none;border:1px solid var(--line);border-radius:8px;padding:8px;align-items:center}
  @media print{.side,.top,.note,.no-print{display:none!important}.app{display:block}.content{padding:0}.slip{border:0;max-width:100%}}

  .login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0B2547,#143765);z-index:100;padding:20px}
  .login-card{background:#fff;border-radius:18px;padding:28px 30px 24px;width:100%;max-width:404px;box-shadow:0 30px 80px -20px rgba(0,0,0,.5)}
  .login-brand{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .login-brand .wm{font-size:17.6px;line-height:1}
  .login-card h2{font-size:16px}.login-card .sub{color:var(--steel);font-size:10.4px;margin:2px 0 18px}
  .lg-err{color:var(--red);font-size:10px;min-height:16px;margin-bottom:4px}
  .demo{margin-top:20px;border-top:1px solid var(--line);padding-top:14px}
  .demo-h{font-size:8.8px;text-transform:uppercase;letter-spacing:.06em;color:var(--steel-l);font-weight:600;margin-bottom:8px}
  .demo-row{display:flex;flex-direction:column;align-items:flex-start;width:100%;text-align:left;background:var(--cloud);border:1px solid var(--line);border-radius:9px;padding:9px 12px;margin-bottom:7px}
  .demo-row:hover{border-color:var(--blue);background:var(--cloud-2)}
  .demo-row b{font-size:10px}.demo-row span{font-size:8.8px;color:var(--steel)}
  .pill-sel{font-family:'IBM Plex Mono',monospace;font-size:8.8px;background:var(--cloud);border:1px solid var(--line);border-radius:20px;padding:6px 12px;color:var(--ink);font-weight:600}
  .uchip{display:flex;align-items:center;gap:8px}
  .ro-pill{background:var(--amber-bg);color:var(--amber);font-weight:600;font-size:8.8px;padding:6px 11px;border-radius:20px}
  .signout{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.8);border-radius:8px;padding:8px 12px;font-size:10px;margin-top:12px;width:100%;cursor:pointer}
  .signout:hover{background:rgba(255,255,255,.08);color:#fff}

  /* ===== mobile capability ===== */
  .panel.flush{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .scrim{display:none;position:fixed;inset:0;background:rgba(8,20,40,.45);z-index:55}
  .scrim.show{display:block}
  @media(min-width:961px){.scrim{display:none!important}}
  @media(max-width:640px){
    .top{padding:10px 14px;gap:10px;flex-wrap:wrap}
    .actions{gap:8px;flex-wrap:wrap;margin-left:auto}
    .content{padding:16px 14px 56px}
    .kpis{grid-template-columns:1fr 1fr;gap:10px}
    .cols{grid-template-columns:1fr;gap:16px}
    .panel{padding:16px}
    .panel.flush table{min-width:600px}
    .uchip>div:not(.avatar){display:none}
    .pill-sel,.pill{max-width:42vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .brand{padding:16px 18px 12px}
    .slip{max-width:100%}
    .who{gap:10px}
    .login-card{padding:22px 20px}
  }
  @media(max-width:420px){
    .kpis{grid-template-columns:1fr}
    .actions .btn{padding:8px 10px}
    .tt p{display:none}
  }

  .edet-head{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:16px}
  .etabs{display:flex;gap:2px;flex-wrap:wrap;border-bottom:1px solid var(--line);margin-bottom:18px}
  .etab{background:none;border:none;padding:9px 13px;font-size:11px;font-weight:600;color:var(--steel);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
  .etab:hover{color:var(--ink)}
  .etab.on{color:var(--blue);border-bottom-color:var(--blue)}
  .epane .form-grid{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:20px}
  @media(max-width:640px){.etab{padding:8px 10px}}

  /* ===== formal statutory payslip ===== */
  #slipHost{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .ps{max-width:860px;margin:0 auto;background:#fff;border:1px solid #333;color:#111;font-size:10px}
  .ps table{width:100%;border-collapse:collapse}
  .ps td,.ps th{border:1px solid #bcbcbc;padding:4px 7px;vertical-align:top;line-height:1.3}
  .ps .hd{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid #333}
  .ps .hd .nm{font-weight:700;font-size:13px;color:#0B2547}
  .ps .hd .ad{font-size:9px;color:#555;margin-top:1px}
  .ps .ttl{text-align:center;font-weight:700;background:#eef2f7;padding:5px;border-bottom:1px solid #bcbcbc;font-size:10.5px}
  .ps .lbl{background:#f6f8fb;font-weight:600;white-space:nowrap}
  .ps .sec td{background:#e7edf5;font-weight:700;text-align:center}
  .ps .r{text-align:right}.ps .c{text-align:center}
  .ps .tot td{font-weight:700;background:#f6f8fb}
  .ps .net td{font-weight:700;background:#eaf7ef;font-size:10.5px}
  .ps .two{display:flex}
  .ps .two>.half{flex:1;min-width:0}
  .ps .two>.half:first-child{border-right:1px solid #bcbcbc}
  .ps .att td{font-size:9.5px}
  .ps .foot{text-align:center;font-size:9px;color:#667;padding:9px}
  @media(max-width:640px){.ps{min-width:700px}}
  @media print{.ps{border:0;max-width:100%}}

  /* uploads + challans */
  .photo-wrap{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .photo-box{width:84px;height:98px;border:1px solid var(--line);border-radius:8px;background:var(--cloud);display:flex;align-items:center;justify-content:center;overflow:hidden;flex:none}
  .photo-box img{width:100%;height:100%;object-fit:cover}
  .photo-ph{font-size:9px;color:var(--steel-l)}
  img.av{display:inline-block}
  .docrow{display:flex;justify-content:space-between;align-items:center;gap:10px;border:1px solid var(--line);border-radius:8px;padding:7px 11px;margin-bottom:6px;font-size:10.4px}
  .docrow .dn b{color:var(--ink)}
  .docrow .dl{color:var(--blue);font-weight:600;margin-right:10px;text-decoration:none}

  /* salary structure components (Cost tab) */
  .comp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .comp-card{border:1px solid var(--line);border-radius:10px;padding:12px 14px;background:#fff}
  .comp-card.net{background:var(--green-bg);border-color:#bfe6d2}
  .comp-h{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--steel-l);font-weight:700;margin-bottom:8px}
  .comp-ln{display:flex;justify-content:space-between;gap:10px;padding:3px 0;font-size:11px}
  .comp-ln b{font-weight:600}
  .comp-ln.tot{border-top:1px solid var(--line);margin-top:4px;padding-top:6px;font-weight:700}
  @media(max-width:640px){.comp-grid{grid-template-columns:1fr}}

  /* list search + pagination */
  .srch{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px 12px;font-size:12px;font-family:inherit;background:var(--cloud);color:var(--ink)}

}
function newRegimeTax(ti){
  const sl=[[400000,0],[800000,.05],[1200000,.10],[1600000,.15],[2000000,.20],[2400000,.25],[Infinity,.30]];
  let tax=0,prev=0;
  for(const [cap,rate] of sl){ if(ti>prev){ tax+=(Math.min(ti,cap)-prev)*rate; prev=cap; } else break; }

  let sur=0; if(ti>20000000)sur=tax*.25;else if(ti>10000000)sur=tax*.15;else if(ti>5000000)sur=tax*.10;
  return r((tax+sur)*(1+state.tds.cess/100));
}
function oldRegimeTax(ti){
  const sl=[[250000,0],[500000,.05],[1000000,.20],[Infinity,.30]];

}

  const m=emp.ctc/12;
  const basic=r(m*state.basicPct);
  const hra=r(basic*(state.metro?0.5:0.4));
  const erPFfull=state.pf.on? r(state.pf.erRate/100*Math.min(basic,state.pf.ceiling)):0;
  const gratuity=r(.0481*basic);
  let gross=r(m-erPFfull-gratuity);
  const esiApp=state.esi.on && gross<=state.esi.threshold;
  let erESIfull=esiApp? r(state.esi.erRate/100*gross):0;
  if(esiApp){ gross=r(m-erPFfull-gratuity-erESIfull); erESIfull=r(state.esi.erRate/100*gross); }
  const special=Math.max(0,gross-basic-hra);
  const a=attOf(emp.id);
  const eBasic=r(basic*a.f), eHra=r(hra*a.f), eSpecial=r(special*a.f), eGross=r(gross*a.f);
  const pfWage=Math.min(eBasic,state.pf.ceiling);
  const eePF=state.pf.on? r(state.pf.eeRate/100*pfWage):0;
  const erPF=state.pf.on? r(state.pf.erRate/100*pfWage):0;
  const eps=state.pf.on? Math.min(r(.0833*pfWage),state.pf.epsCap):0;
  const epf=erPF-eps;
  const eeESI=esiApp? r(state.esi.eeRate/100*eGross):0;
  const erESI=esiApp? r(state.esi.erRate/100*eGross):0;
  const pt=state.pt.on? ptForState(emp.state,gross):0;
  const lwf=state.lwfOn?(LWF[emp.state]?LWF[emp.state].ee:0):0;
  const lwfEr=state.lwfOn?(LWF[emp.state]?LWF[emp.state].er:0):0;
  const regime=emp.regime||state.tds.regime;
  const annualGross=gross*12;
  const sd=regime==='new'?state.tds.sd:state.tds.sdOld;
  const decl=regime==='old'?Math.min(emp.decl80c||0,150000):0;
  const taxable=Math.max(0,annualGross-sd-decl);
  const annualTax=regime==='new'?newRegimeTax(taxable):oldRegimeTax(taxable);
  const tdsFull=r(annualTax/12);
  const tds=r(tdsFull*a.f);
  const bonus=(state.bonus.on&&gross<=state.bonus.eligibilityGross)?r(state.bonus.pct/100*Math.min(eBasic,state.bonus.wageCap)):0;
  const wagesPct=gross>0?basic/gross:0;
  const totalDed=eePF+eeESI+pt+tds+lwf;
  const net=eGross-totalDed;
  const ctcMonthly=gross+erPFfull+gratuity+erESIfull+lwfEr+bonus;
  return {basic,hra,special,gross,eBasic,eHra,eSpecial,eGross,eePF,erPF,eps,epf,eeESI,erESI,erPFfull,erESIfull,gratuity,pt,tds,tdsFull,lwf,lwfEr,bonus,wagesPct,regime,esiApp,totalDed,net,annualTax,taxable,annualGross,ctcMonthly,att:a};
}
function totals(){
  let t={count:emps().length,gross:0,net:0,ctc:0,pf:0,esi:0,pt:0,tds:0,erPF:0,gratuity:0,lop:0,lwf:0,bonus:0};
  emps().forEach(e=>{const c=compute(e);
    t.gross+=c.eGross;t.net+=c.net;t.ctc+=c.ctcMonthly;t.pf+=c.eePF+c.erPF;t.esi+=c.eeESI+c.erESI;
    t.pt+=c.pt;t.tds+=c.tds;t.erPF+=c.erPF;t.gratuity+=c.gratuity;t.lop+=c.att.lop;t.lwf+=c.lwf;t.bonus+=c.bonus;});
  return t;
}

function wordsINR(num){
  num=Math.round(num); if(num===0) return 'Zero Rupees';
  const a=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const b=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  const two=n=> n<20? a[n] : b[Math.floor(n/10)]+(n%10? ' '+a[n%10]:'');
  const three=n=> (n>=100? a[Math.floor(n/100)]+' Hundred'+(n%100?' ':'') : '')+(n%100? two(n%100):'');
  let out='',x=num;
  const cr=Math.floor(x/10000000);x%=10000000;const lk=Math.floor(x/100000);x%=100000;const th=Math.floor(x/1000);x%=1000;const hu=x;
  if(cr)out+=three(cr)+' Crore ';if(lk)out+=three(lk)+' Lakh ';if(th)out+=three(th)+' Thousand ';if(hu)out+=three(hu);
  return out.trim().replace(/\s+/g,' ')+' Rupees Only';
}

  const bankId=g('f_bank')||(state.banks[0]&&state.banks[0].id);
  state.employees.push({id,empCode:'EMP'+String(id).padStart(3,'0'),name,role:g('f_role')||'Employee',ctc,

    fixedCostPerDay:+g('f_fixedday')||Math.round(ctc/365),perDayCTC:+g('f_perdayctc')||Math.round(ctc/365),

function empCellMini(e){return `<span class="av" style="background:${avColor(e.id)};width:30px;height:30px">${initials(e.name)}</span><span style="font-weight:600">${e.name}</span>`;}

function resolveReq(rid,approve){
  const i=state.regReqs.findIndex(r=>r.id===rid);if(i<0)return;const rq=state.regReqs[i];

  state.regReqs.splice(i,1);

Vikram Singh, 30, 2

function impSample(){document.getElementById('impText').value='EmployeeID,TotalDays,LOP\n2,30,0\n4,30,2\nArjun Nair,30,1\nSneha Patil,30,0';impPreview();}
function impLoadFile(input){const f=input.files&&input.files[0];if(!f)return;const rd=new FileReader();rd.onload=e=>{document.getElementById('impText').value=e.target.result;impPreview();toast('Loaded '+f.name);};rd.readAsText(f);}
function findEmp(key){key=(key||'').trim();const L=emps();if(/^\d+$/.test(key))return L.find(e=>e.id===+key);const k=key.toLowerCase();return L.find(e=>e.name.toLowerCase()===k)||L.find(e=>e.name.toLowerCase().includes(k)&&k.length>2);}
function parseImport(){
  const txt=(document.getElementById('impText')||{}).value||'';
  const out=[],bad=[];
  txt.split(/\r?\n/).forEach(line=>{if(!line.trim())return;const cols=line.split(',').map(s=>s.trim());const emp=findEmp(cols[0]);if(!emp){bad.push(cols[0]);return;}
    let total=state.monthDays,lop=0;
    if(cols.length>=3){total=+cols[1]||state.monthDays;lop=+cols[2]||0;} else if(cols.length===2){lop=+cols[1]||0;}
    out.push({emp,total,lop:Math.max(0,Math.min(lop,total))});});
  return {out,bad};
}
function impPreview(){
  const host=document.getElementById('impPreview');if(!host)return;
  const {out,bad}=parseImport();
  if(!out.length){host.innerHTML='<div class="note" style="margin:0">Nothing parsed yet. Paste rows or load the sample.</div>'+(bad.length?`<div class="note">Unmatched: ${bad.filter(b=>b&&!/employee|empid|name/i.test(b)).join(', ')||'—'}</div>`:'');return;}
  host.innerHTML=`<table><thead><tr><th>Employee</th><th class="num">Total</th><th class="num">LOP</th><th class="num">Payable</th></tr></thead><tbody>
    ${out.map(r=>`<tr><td>${r.emp.name}</td><td class="num">${r.total}</td><td class="num">${r.lop}</td><td class="num">${r.total-r.lop}</td></tr>`).join('')}</tbody></table>
    <div class="note">${out.length} row(s) matched${bad.filter(b=>b&&!/employee|empid|name/i.test(b)).length?' · unmatched: '+bad.filter(b=>b&&!/employee|empid|name/i.test(b)).join(', '):''}</div>`;
}
function impApply(){
  const {out}=parseImport();if(!out.length){toast('Nothing to import');return;}
  out.forEach(r=>{state.attendance[r.emp.id]={totalDays:r.total,lop:r.lop};});
  toast(out.length+' attendance row(s) imported');go('att-regular');
}

function exportRegister(){
  const head=['Employee','State','PayableDays','Basic','HRA','Special','Gross','EmployeePF','EmployerPF','ESI_EE','ESI_ER','PT','TDS','Net'];
  const lines=[head.join(',')];
  state.employees.forEach(e=>{const c=compute(e);lines.push([JSON.stringify(e.name),e.state,c.att.paid+'/'+c.att.total,c.eBasic,c.eHra,c.eSpecial,c.eGross,c.eePF,c.erPF,c.eeESI,c.erESI,c.pt,c.tds,c.net].join(','));});
  const blob=new Blob([lines.join('\n')],{type:'text/csv'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='payroll-register-'+state.payMonth+'-'+state.payYear+'.csv';a.click();URL.revokeObjectURL(url);
  toast('Register exported as CSV');
}

function buildSlip(){
  const e=emps().find(x=>x.id===slipEmp)||emps()[0];const c=compute(e);

  const f2=n=>(Math.round((+n||0)*100)/100).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
  const idx=Math.max(0,MONTHS.indexOf(mo));
  const lb=state.leaveBal[e.id]||{EL:{accrued:0,used:0}}; const balEL=(lb.EL.accrued-lb.EL.used)||0;
  const earn=[['Basic Earned',c.eBasic],['H.R.A',c.eHra],['Special Allowance',c.eSpecial]];
  const ded=[['PROV.FUND',c.eePF],['E.S.I.C',c.eeESI],['P.Tax',c.pt],['L.W.F',c.lwf],['TDS',c.tds]].filter(x=>x[1]>0);
  const rows=Math.max(earn.length,ded.length); let ed='';
  for(let i=0;i<rows;i++){const a=earn[i],d=ded[i];
    ed+=`<tr><td>${a?a[0]:''}</td><td class="r"></td><td class="r">${a?f2(a[1]):''}</td><td>${d?d[0]:''}</td><td class="r"></td><td class="r">${d?f2(d[1]):''}</td></tr>`;}
  const sd=c.regime==='new'?state.tds.sd:state.tds.sdOld;
  const decl=c.regime==='old'?Math.min(e.decl80c||0,150000):0;
  const allIn=c.annualTax, preCess=Math.round(allIn/(1+state.tds.cess/100)), cess=allIn-preCess;
  const ptA=c.pt*12, totalIncome=c.annualGross-sd, ytd=Math.round(c.tdsFull*idx);
  const pfAct=c.eePF*(idx+1), pfProj=c.eePF*12, viaAllowed=c.regime==='old'?Math.min(pfProj,150000):0;
  const tp=[]; for(let i=0;i<12;i++){tp.push(i<idx?Math.round(c.tdsFull):(i===idx?Math.round(c.tds):0));}
  const mk=`<svg width="34" height="34" viewBox="0 0 120 120"><g transform="rotate(-26 60 60)"><path d="M15,60 A45,25 0 0 1 105,60" fill="none" stroke="#F47C20" stroke-width="12" stroke-linecap="round"/><path d="M105,60 A45,25 0 0 1 15,60" fill="none" stroke="#2BA6E8" stroke-width="12" stroke-linecap="round"/></g><path d="M30,90 L75.9,44.1" fill="none" stroke="#2BA6E8" stroke-width="11" stroke-linecap="round"/><path d="M90,30 L84.3,52.6 L67.4,35.7 Z" fill="#2BA6E8"/></svg>`;
  document.getElementById('slipHost').innerHTML=`
  <div class="ps">

    <div class="ttl">Payslip for the Month: ${mo} - ${state.payYear}</div>

      <tr><td class="lbl">Location</td><td>${e.state}</td><td class="lbl">Department</td><td>${deptName(e.dept)}</td><td class="lbl">Designation</td><td>${e.role}</td></tr>
      <tr><td class="lbl">Bank Name</td><td>${bankName(e.bankId)}</td><td class="lbl">Bank Account No.</td><td>${e.bankAcc||'—'}</td><td class="lbl">Emp PAN</td><td>${e.pan}</td></tr>
      <tr><td class="lbl">UAN No.</td><td>${e.uan}</td><td class="lbl">PF No.</td><td>—</td><td class="lbl">ESIC No.</td><td>${c.esiApp?'—':'N.A.'}</td></tr>
    </tbody></table>
    <table class="att"><tbody>
      <tr><td>Days Paid : <b>${f2(c.att.paid)}</b></td><td>Days Present : <b>${f2(c.att.paid)}</b></td><td>Weekly Off : <b>0.00</b></td><td>Paid Holiday : <b>0.00</b></td><td>LWP : <b>${f2(c.att.lop)}</b></td><td>Absent : <b>0.00</b></td></tr>
      <tr><td>EL : <b>0.00</b></td><td>Bal. EL : <b>${f2(balEL)}</b></td><td>OL : <b>0.00</b></td><td>Bal. OL : <b>0.00</b></td><td>CO + : <b>0.00</b></td><td>CO - : <b>0.00</b></td></tr>
    </tbody></table>
    <table><thead><tr class="sec"><td>Earnings</td><td>Arrears</td><td>Amount</td><td>Deductions</td><td>Arrears</td><td>Amount</td></tr></thead>
    <tbody>${ed}
      <tr class="tot"><td>Total Earning</td><td class="r">0.00</td><td class="r">${f2(c.eGross)}</td><td>Total Deduction</td><td class="r">0.00</td><td class="r">${f2(c.totalDed)}</td></tr>

          <tr><td># PF Deducted (Projected)</td><td class="r">${f2(pfProj)}</td><td class="r"></td></tr>

        </tbody></table>
      </div>
      <div class="half">
        <table><thead><tr class="sec"><td colspan="2">Income Tax Deduction</td></tr></thead><tbody>
          <tr><td>Gross Salary</td><td class="r">${f2(c.annualGross)}</td></tr>

        </tbody></table>
        <table class="att"><thead><tr class="sec"><td colspan="6">Tax Paid Details</td></tr></thead><tbody>

          <tr class="c"><td>${tp[0]}</td><td>${tp[1]}</td><td>${tp[2]}</td><td>${tp[3]}</td><td>${tp[4]}</td><td>${tp[5]}</td></tr>

      </div>
    </div>
    <div class="foot">This is a system generated payslip and does not require a signature · boom Payroll · generated ${new Date().toLocaleDateString('en-IN')}</div>
  </div>`;
}

   offline prototype mode (in-memory demo). Force offline with ?demo=1.
   If the front end is on a DIFFERENT origin than the API, set API.base to the
   API URL; if you proxy /api/* via Cloudflare _redirects, leave it blank. */
const API={ base:'', token:null,
  enabled:(location.protocol==='http:'||location.protocol==='https:') && !/[?&]demo=1/.test(location.search) };
function apiUrl(p){return (API.base||'')+p;}
function apiHeaders(){return API.token?{'Authorization':'Bearer '+API.token,'Content-Type':'application/json'}:{'Content-Type':'application/json'};}
async function apiLogin(u,p){const r=await fetch(apiUrl('/api/auth/login'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});let d={};try{d=await r.json();}catch(e){}if(!r.ok)throw new Error(d.error||'Invalid username or password');return d;}
async function apiGet(p){const r=await fetch(apiUrl(p),{headers:apiHeaders()});let d={};try{d=await r.json();}catch(e){}if(!r.ok)throw new Error(d.error||('HTTP '+r.status));return d;}
function mapAuthUser(u){return {u:u.username,name:u.name||u.username,role:u.role,plants:u.plant?[u.plant]:'all',empId:u.emp_id||null};}
function mapApiEmp(r){return {id:r.id,empCode:r.emp_code,name:r.name,role:r.role,ctc:Number(r.ctc||0),state:r.state,plant:r.plant,dept:r.dept,pan:r.pan,uan:r.uan,regime:r.regime||undefined,decl80c:Number(r.decl80c||0)};}
async function apiBootData(){try{const e=await apiGet('/api/employees?size=200');if(e&&e.rows){state.employees=e.rows.map(mapApiEmp);state._empTotal=e.total;}}catch(err){console.warn('employee load failed',err);}}
async function doLogin(u,p){
  if(!API.enabled)return doLoginLocal(u,p);
  loginErr('');
  try{
    const res=await apiLogin(u,p);
    const user=mapAuthUser(res.user);
    API.token=res.token; state.auth=user;
    state.plantScope=(user.plants==='all'||user.plants.length>1)?'all':user.plants[0];
    await apiBootData();
    logAudit('Signed in');
    document.getElementById('login').style.display='none';
    document.querySelector('.app').style.display='grid';
    state.view=firstAllowed(); render();
    toast('Welcome, '+user.name.split(' ')[0]);
  }catch(e){ loginErr(e.message||'Login failed'); }
}
function doLoginLocal(u,p){const user=USERS.find(x=>x.u===u&&x.p===p);if(!user){loginErr('Invalid username or password');return;}state.auth=user;logAudit('Signed in');state.plantScope=(user.plants==='all'||user.plants.length>1)?'all':user.plants[0];document.getElementById('login').style.display='none';document.querySelector('.app').style.display='grid';state.view=firstAllowed();render();toast('Welcome, '+user.name.split(' ')[0]);}
function submitLogin(){doLogin(val('lg_u'),val('lg_p'));}
function logout(){state.auth=null;API.token=null;loginErr('');document.getElementById('lg_u').value='';document.getElementById('lg_p').value='';showLogin();}

function applyLeave(meId){
  const empId=meId||+val('la_emp');
  const type=val('la_type'),days=+val('la_days'),from=val('la_from')||'—',to=val('la_to')||'—',reason=val('la_reason')||'—';
  if(!empId||!days){toast('Select employee and number of days');return;}
  state.leaveApps.unshift({id:lseq++,empId,type,from,to,days,reason,status:'Pending'});
  logAudit('Applied '+type+' leave ('+days+'d) for emp #'+empId);
  toast('Leave application submitted for approval');render();
}
function decideLeave(id,ok){
  const a=state.leaveApps.find(x=>x.id===id);if(!a)return;
  a.status=ok?'Approved':'Rejected';
  if(ok){const t=state.leaveTypes.find(x=>x.code===a.type);
    if(t&&t.lop){const at=state.attendance[a.empId]||(state.attendance[a.empId]={totalDays:state.monthDays,lop:0});at.lop=Math.min(at.totalDays,(at.lop||0)+a.days);}
    else{const b=state.leaveBal[a.empId];if(b&&b[a.type])b[a.type].used+=a.days;}
  }
  logAudit((ok?'Approved':'Rejected')+' '+a.type+' leave for emp #'+a.empId);
  toast('Leave '+(ok?'approved — applied to payroll':'rejected'));render();
}

let fnfEmp=null;
function genFNF(n){logAudit('Generated F&F settlement for '+n);toast('F&F statement generated');}
function vFNF(){
  const list=emps(); if(!fnfEmp||!list.some(e=>e.id===fnfEmp))fnfEmp=list[0]?list[0].id:null;
  if(!fnfEmp)return '<div class="panel">No employees in scope.</div>';
  const e=state.employees.find(x=>x.id===fnfEmp);const c=compute(e);
  const b=state.leaveBal[e.id]||{EL:{accrued:0,used:0,enc:0}};
  const elBal=b.EL.accrued-b.EL.used-(b.EL.enc||0);const daily=r(c.basic/30);const enc=r(elBal*daily);
  const years=Math.max(0,Math.floor((new Date('2026-06-30')-new Date(e.doj))/(365.25*864e5)));
  const gratuity=years>=5?r(c.basic*15/26*years):0;
  const bonusAnnual=r(c.bonus*12);
  const noticeRec=0;
  const settlement=c.net+enc+gratuity+bonusAnnual-noticeRec;
  return `
  <div class="panel" style="margin-bottom:16px"><div class="row-between">
    <div class="field" style="margin:0;min-width:250px"><label>Employee separating</label><select onchange="fnfEmp=+this.value;render()">${list.map(x=>`<option value="${x.id}" ${x.id===fnfEmp?'selected':''}>${x.name} — ${x.role}</option>`).join('')}</select></div>
    <div style="text-align:right"><div class="note" style="margin:0">Date of joining ${e.doj} &middot; ${years} yrs service</div><div class="note" style="margin:3px 0 0;color:var(--amber)">⚠ Settle within 2 working days of exit (Labour Codes)</div></div></div></div>
  <div class="grid2"><div class="panel">
    <h3>Settlement statement</h3><div class="sub">${e.name}</div>
    ${mLine('Final month salary (net)',inr(c.net))}
    ${mLine('Leave encashment ('+elBal+' EL days)',inr(enc))}
    ${mLine('Gratuity'+(years>=5?'':' — not eligible (<5 yrs)'),inr(gratuity))}
    ${mLine('Statutory bonus (annual provision)',inr(bonusAnnual))}
    ${mLine('Notice / recoveries','−'+inr(noticeRec))}
    ${mLine('Net settlement payable',inr(settlement),true)}
    <button class="btn btn-primary editable" style="margin-top:14px" onclick="genFNF('${e.name}')">Generate F&amp;F statement</button>
  </div>
  <div class="panel"><h3>Basis of computation</h3><div class="sub">How each component is derived</div>
    <div class="note" style="margin:8px 0 0;line-height:1.85">
    • <b>Leave encashment</b> = EL balance × (Basic ÷ 30) on the Code-on-Wages base (FR-PR-FNF, FR-LM-ENC).<br>
    • <b>Gratuity</b> = (15 ÷ 26) × Basic × completed years, payable at ≥ 5 years (FR-PR-GRAT).<br>
    • <b>Bonus</b> = statutory bonus accrued over the year (FR-PR-GRAT-003).<br>
    • <b>Recoveries</b> = notice shortfall, advances, asset dues (configurable).<br>
    • Consolidated and settled within the statutory exit window (FR-PR-FNF-002).</div></div></div>`;
}

/* ===================== Photo / document uploads, Code Setup, Challans ===================== */
function genEmpCode(){const c=state.empCodeCfg;const code=(c.prefix||'EMP')+(c.sep||'')+String(c.next||1).padStart(c.pad||3,'0');c.next=(c.next||1)+1;return code;}
function readFileAs(input,cb){const fl=input&&input.files&&input.files[0];if(!fl){toast('Choose a file first');return;}const rd=new FileReader();rd.onload=()=>cb(rd.result,fl);rd.readAsDataURL(fl);}
function downscaleImg(dataUrl,max,cb){try{const img=new Image();img.onload=()=>{const sc=Math.min(1,max/Math.max(img.width||max,img.height||max));const w=Math.max(1,Math.round((img.width||max)*sc)),hh=Math.max(1,Math.round((img.height||max)*sc));const cv=document.createElement('canvas');cv.width=w;cv.height=hh;cv.getContext('2d').drawImage(img,0,0,w,hh);cb(cv.toDataURL('image/jpeg',0.82));};img.onerror=()=>cb(dataUrl);img.src=dataUrl;}catch(e){cb(dataUrl);}}
function setPhoto(scope){const inp=document.getElementById(scope+'_photo_file');const form=scope==='emp'?state.empForm:state.conForm;if(!form)return;readFileAs(inp,d=>{downscaleImg(d,320,small=>{form.photo=small;const img=document.getElementById(scope+'_photo_img');if(img){img.src=small;img.style.display='block';}const ph=document.getElementById(scope+'_photo_ph');if(ph)ph.style.display='none';toast('Photo attached');});});}
function photoField(scope,photo){return `<div class="field" style="grid-column:1/-1"><label>Photograph</label><div class="photo-wrap"><div class="photo-box"><img id="${scope}_photo_img" src="${photo||''}" style="display:${photo?'block':'none'}"><span id="${scope}_photo_ph" class="photo-ph" style="display:${photo?'none':'block'}">No photo</span></div><div><input class="editable" id="${scope}_photo_file" type="file" accept="image/*" onchange="setPhoto('${scope}')"><div class="note" style="margin:6px 0 0">JPG / PNG — appears on the profile.</div></div></div></div>`;}
function docRows(scope){const form=scope==='emp'?state.empForm:state.conForm;const docs=(form&&form.docs)||[];return docs.length?docs.map((d,i)=>`<div class="docrow"><span class="dn"><b>${d.type}</b> · ${d.name}</span><span><a class="dl" href="${d.data}" target="_blank" rel="noopener">View</a><button class="btn btn-ghost btn-sm editable" onclick="rmDoc('${scope}',${i})">Remove</button></span></div>`).join(''):'<div class="note" style="margin:0">No documents uploaded yet.</div>';}
function renderDocs(scope){const host=document.getElementById(scope+'_doclist');if(host)host.innerHTML=docRows(scope);}
function addDoc(scope){const form=scope==='emp'?state.empForm:state.conForm;if(!form)return;const type=document.getElementById(scope+'_doc_type').value;const inp=document.getElementById(scope+'_doc_file');readFileAs(inp,(d,fl)=>{form.docs=form.docs||[];form.docs.push({type,name:fl.name,data:d});inp.value='';renderDocs(scope);toast('Document added');});}
function rmDoc(scope,i){const form=scope==='emp'?state.empForm:state.conForm;(form.docs||[]).splice(i,1);renderDocs(scope);}
function docPane(scope){const types=['Aadhaar','PAN Card','Education Certificate','Experience Certificate','Medical Certificate','Bank Proof','Contract / Agreement','CLRA Licence','GST Certificate','Photograph','Other'];
  return `<div class="field" style="grid-column:1/-1"><label>Upload document / certificate</label>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <select class="editable" id="${scope}_doc_type" style="max-width:230px">${types.map(o=>`<option>${o}</option>`).join('')}</select>
      <input class="editable" id="${scope}_doc_file" type="file">
      <button class="btn btn-primary editable" onclick="addDoc('${scope}')">Add document</button></div></div>
  <div class="field" style="grid-column:1/-1"><label>Uploaded documents</label><div id="${scope}_doclist">${docRows(scope)}</div></div>`;}

function vCodeSetup(){
  const c=state.empCodeCfg;const preview=(c.prefix||'')+(c.sep||'')+String(c.next||1).padStart(c.pad||3,'0');
  return `
  <div class="panel" style="max-width:580px"><h3>Employee code policy</h3><div class="sub">Define how new employee codes are generated as per company policy.</div>
    <div class="form-grid" style="margin-top:6px">
      <div class="field"><label>Prefix</label><input class="editable" value="${c.prefix||''}" onchange="state.empCodeCfg.prefix=this.value;render()"></div>
      <div class="field"><label>Separator</label><input class="editable" value="${c.sep||''}" placeholder="(none)" onchange="state.empCodeCfg.sep=this.value;render()"></div>
      <div class="field"><label>Number of digits</label><input class="editable" type="number" min="1" max="8" value="${c.pad}" onchange="state.empCodeCfg.pad=Math.max(1,Math.min(8,+this.value||3));render()"></div>
      <div class="field"><label>Next number</label><input class="editable" type="number" min="1" value="${c.next}" onchange="state.empCodeCfg.next=Math.max(1,+this.value||1);render()"></div>
    </div>
    <div class="note">The next new employee will be coded <b>${preview}</b>. The number auto-increments after each employee is created. SAP code is captured per employee on the Job tab for ERP integration.</div>
  </div>`;
}

function conStatTotal(cid,type){let t=0;emps().filter(e=>e.contractor===cid).forEach(e=>{const c=compute(e);t+=type==='PF'?(c.eePF+c.erPF):type==='ESI'?(c.eeESI+c.erESI):type==='LWF'?(c.lwf+c.lwfEr):type==='PT'?c.pt:0;});return Math.round(t);}
function toggleChallan(){const fm=document.getElementById('chForm');if(fm){const show=fm.style.display==='none';fm.style.display=show?'block':'none';if(show)chEstimate();}}
function chEstimate(){const con=document.getElementById('ch_con'),type=document.getElementById('ch_type'),amt=document.getElementById('ch_amt');if(con&&type&&amt)amt.value=conStatTotal(con.value,type.value);}
function readChallanFile(input,cb){const fl=input&&input.files&&input.files[0];if(!fl){cb(null);return;}const rd=new FileReader();rd.onload=()=>{if(/^image\//.test(fl.type)){downscaleImg(rd.result,1100,small=>cb({name:fl.name,data:small}));}else{cb({name:fl.name,data:rd.result});}};rd.readAsDataURL(fl);}
function attachChallanDoc(id,input){readChallanFile(input,doc=>{if(!doc)return;const ch=state.challans.find(x=>x.id===id);if(ch){ch.doc=doc;logAudit('Attached document to '+ch.type+' challan '+ch.no);toast('Challan document attached');render();}});}
function addChallan(){const con=val('ch_con'),type=val('ch_type'),month=val('ch_month'),year=val('ch_year'),no=val('ch_no'),amt=+val('ch_amt'),date=val('ch_date'),status=val('ch_status')||'Paid';
  if(!con||!no||!amt){toast('Contractor, challan no. and amount are required');return;}
  readChallanFile(document.getElementById('ch_doc'),doc=>{
    state.challans.unshift({id:Date.now(),con,type,month,year,no,amt,date,status,doc:doc||null});
    logAudit('Recorded '+type+' challan '+no+(doc?' (with document)':''));toast('Challan recorded');render();
  });}
function vChallans(){
  const types=['PF','ESI','LWF','PT'];
  return `
  <div class="row-between" style="margin-bottom:16px"><div class="sec-title" style="margin:0">${state.challans.length} challan record(s)</div>
    <button class="btn btn-orange editable" onclick="toggleChallan()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> Add challan</button></div>
  <div id="chForm" class="panel" style="display:none;margin-bottom:16px"><h3 style="margin-bottom:14px">New challan</h3>
    <div class="form-grid">
      <div class="field"><label>Contractor *</label><select id="ch_con" onchange="chEstimate()">${state.contractors.map(c=>`<option value="${c.id}">${c.code} — ${c.name}</option>`).join('')}</select></div>
      <div class="field"><label>Challan type *</label><select id="ch_type" onchange="chEstimate()">${types.map(t=>`<option>${t}</option>`).join('')}</select></div>
      <div class="field"><label>Period (month)</label><select id="ch_month">${MONTHS.map(m=>`<option ${m===state.payMonth?'selected':''}>${m}</option>`).join('')}</select></div>
      <div class="field"><label>Year</label><input id="ch_year" type="number" value="${state.payYear}"></div>
      <div class="field"><label>Challan no. *</label><input id="ch_no" placeholder="CRN / TRRN / ESIC / PT ref"></div>
      <div class="field"><label>Amount *</label><div class="inwrap"><span class="cur">₹</span><input id="ch_amt" type="number" placeholder="0"></div></div>
      <div class="field"><label>Paid date</label><input id="ch_date" type="date"></div>
      <div class="field"><label>Status</label><select id="ch_status"><option>Paid</option><option>Pending</option></select></div>
      <div class="field"><label>Challan document</label><input id="ch_doc" type="file" accept="application/pdf,image/*"></div>
    </div>
    <div class="note">Amount is auto-estimated from the contractor's employees for the selected statutory type — adjust to the actual challan figure.</div>
    <div style="display:flex;gap:10px"><button class="btn btn-primary" onclick="addChallan()">Save challan</button><button class="btn btn-ghost" onclick="toggleChallan()">Cancel</button></div></div>
  <div class="panel flush"><table><thead><tr><th>Contractor</th><th>Type</th><th>Period</th><th>Challan No</th><th class="num">Amount</th><th>Paid date</th><th>Status</th><th>Document</th></tr></thead><tbody>
  ${state.challans.length?state.challans.map(ch=>{const c=state.contractors.find(x=>x.id===ch.con)||{};return `<tr><td><span class="tag o">${c.code||'—'}</span> ${c.name||''}</td><td><span class="tag b">${ch.type}</span></td><td>${ch.month} ${ch.year}</td><td class="mono">${ch.no}</td><td class="num">${inr(ch.amt)}</td><td>${ch.date||'—'}</td><td><span class="tag ${ch.status==='Paid'?'g':'a'}">${ch.status}</span></td><td>${ch.doc?`<a class="dl" href="${ch.doc.data}" target="_blank" rel="noopener">View</a> <span style="color:var(--steel-l);font-size:10px">${ch.doc.name||''}</span>`:`<label class="btn btn-ghost btn-sm editable" style="cursor:pointer">Attach<input type="file" accept="application/pdf,image/*" hidden onchange="attachChallanDoc(${ch.id},this)"></label>`}</td></tr>`;}).join(''):'<tr><td colspan="8" style="color:var(--steel)">No challans recorded yet.</td></tr>'}
  </tbody></table></div>
  <div class="note">Contractor statutory challans — <b>PF, ESI, LWF, PT</b> — recorded per contractor and period, with the <b>challan document</b> (PDF / scan) attached for CLRA / principal-employer compliance.</div>`;
}


/* ===================== Salary structure / payslip components (Cost tab) ===================== */
function payComp(e){
  if(!e||!e.ctc){return '<div class="note" style="margin:0">Enter Annual CTC above, then Save or Recalculate to view the monthly salary structure.</div>';}
  const c=compute(e);
  const ln=(n,v)=>`<div class="comp-ln"><span>${n}</span><b>${inr(v)}</b></div>`;
  const earn=[['Basic',c.basic],['House Rent Allowance',c.hra],['Special Allowance',c.special]];
  const ded=[['Provident Fund (EPF)',c.eePF],['ESI',c.eeESI],['Professional Tax',c.pt],['Labour Welfare Fund',c.lwf],['TDS',c.tds]].filter(x=>x[1]>0);
  const er=[['Employer PF',c.erPF],['Gratuity',c.gratuity],['ESI (Employer)',c.erESI],['Statutory Bonus',c.bonus],['LWF (Employer)',c.lwfEr]].filter(x=>x[1]>0);
  return `
  <div class="comp-grid">
    <div class="comp-card"><div class="comp-h">Earnings (monthly)</div>${earn.map(x=>ln(x[0],x[1])).join('')}<div class="comp-ln tot"><span>Gross</span><b>${inr(c.gross)}</b></div></div>
    <div class="comp-card"><div class="comp-h">Deductions (monthly)</div>${ded.length?ded.map(x=>ln(x[0],x[1])).join(''):'<div class="comp-ln"><span>None</span><b>₹0</b></div>'}<div class="comp-ln tot"><span>Total</span><b>${inr(c.totalDed)}</b></div></div>
    <div class="comp-card net"><div class="comp-h">Net pay (take-home)</div><div class="comp-ln tot" style="border:0;margin:0;padding:0"><span>Monthly</span><b>${inr(c.net)}</b></div><div class="note" style="margin:6px 0 0">${wordsINR(c.net)}</div></div>
    <div class="comp-card"><div class="comp-h">Employer cost (part of CTC)</div>${er.map(x=>ln(x[0],x[1])).join('')}<div class="comp-ln tot"><span>Monthly CTC</span><b>${inr(c.ctcMonthly)}</b></div></div>
  </div>
  <div class="note" style="margin:8px 0 0">CTC ${inr(e.ctc)} · Basic ${Math.round(state.basicPct*100)}% of CTC · ${e.state||'—'} PT · ${(e.regime||state.tds.regime)==='new'?'New':'Old'} regime · ${c.wagesPct<state.wageMinPct?'<b style="color:var(--red)">Wages &lt; 50%</b>':'<b style="color:var(--green)">Wages \u2265 50% compliant</b>'}.</div>`;
}
function payComponents(e){
  return `<div class="field" style="grid-column:1/-1"><label>Salary structure / payslip components (monthly)</label>
    <div style="margin:0 0 10px"><button type="button" class="btn btn-ghost btn-sm" onclick="previewComp()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg> Recalculate from CTC above</button></div>
    <div id="costComp">${payComp(e)}</div></div>`;
}
function previewComp(){
  const g=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};
  const base=state.empForm||{};
  const tmp=Object.assign({},base,{ctc:+g('f_ctc')||0,state:g('f_state')||base.state});
  const host=document.getElementById('costComp'); if(host)host.innerHTML=payComp(tmp);
}


/* ===================== List pagination / search / export (scale) ===================== */
function pagerCtrl(pg,pages,total,fn){if(pages<=1)return `<div class="pager"><span>${total} record(s)</span></div>`;const b=(n,l,d)=>`<button class="pgbtn" ${d?'disabled':''} onclick="${fn}(${n})">${l}</button>`;return `<div class="pager"><span>Page ${pg} of ${pages} · ${total} record(s)</span><span class="pgs">${b(1,'\u00ab',pg===1)}${b(pg-1,'\u2039',pg===1)}${b(pg+1,'\u203a',pg===pages)}${b(pages,'\u00bb',pg===pages)}</span></div>`;}

function empRowHTML(e){const c=compute(e);return `<tr>
  <td><div class="emp"><span class="av" style="background:${avColor(e.id)}">${e.photo?`<img src="${e.photo}" style="width:100%;height:100%;object-fit:cover">`:initials(e.name)}</span><div><div class="nm">${e.name}</div><div class="rl">${e.empCode} \u00b7 ${e.role} \u00b7 ${deptName(e.dept)}</div></div></div></td>
  <td>${e.state}</td><td>${contractorTag(e)}</td><td>${lookupName("grade",e.grade)}</td><td class="num">${inr(e.ctc)}</td><td class="num">${inr(c.gross)}</td><td class="num" style="font-weight:700">${inr(c.net)}</td>
  <td>${state.pf.on?'<span class="tag b">PF</span> ':''}${c.esiApp?'<span class="tag o">ESI</span> ':''}${c.pt?'<span class="tag g">PT</span> ':''}${c.lwf?'<span class="tag g">LWF</span> ':''}${c.tds?'<span class="tag a">TDS</span> ':''}${c.wagesPct<state.wageMinPct?'<span class="tag r">Wages&lt;50%</span>':''}</td>
  <td style="text-align:right;white-space:nowrap"><button class="btn btn-ghost btn-sm" onclick="openEmp(${e.id})">Open</button> <button class="btn btn-ghost btn-sm" onclick="viewSlipFor(${e.id})">Payslip</button></td></tr>`;}
function empSlice(){
  const all=emps(); const q=(state.empQ||'').toLowerCase();
  const filtered=q?all.filter(e=>(e.name+' '+(e.empCode||'')+' '+(e.role||'')+' '+e.state+' '+deptName(e.dept)+' '+contractorName(e.contractor)+' '+lookupName('grade',e.grade)).toLowerCase().includes(q)):all;
  const size=state.pageSize||25; const pages=Math.max(1,Math.ceil(filtered.length/size));
  let pg=Math.min(Math.max(1,state.empPg||1),pages); state.empPg=pg;
  const rows=filtered.slice((pg-1)*size,(pg-1)*size+size);
  return {rowsHtml:rows.length?rows.map(empRowHTML).join(''):'<tr><td colspan="9" style="color:var(--steel)">No matching employees.</td></tr>',pagerHtml:pagerCtrl(pg,pages,filtered.length,'gotoEmp'),countLabel:`${filtered.length}${q?' of '+all.length:''} employees`};
}
function renderEmpTable(){const sl=empSlice();const r=document.getElementById('empRows');if(r)r.innerHTML=sl.rowsHtml;const p=document.getElementById('empPager');if(p)p.innerHTML=sl.pagerHtml;const c=document.getElementById('empCount');if(c)c.textContent=sl.countLabel;}
function filterEmp(){const i=document.getElementById('empSrch');state.empQ=i?i.value:'';state.empPg=1;renderEmpTable();}
function gotoEmp(n){state.empPg=n;renderEmpTable();}
function exportEmployees(){
  const head=['EmpCode','Name','Gender','DOB','DOJ','Department','Designation','Grade','Category','Skill','Plant','Contractor','WorkState','Country','State','City','PAN','Aadhaar','UAN','SAPCode','Mobile','Email','Bank','BankAcc','IFSC','AnnualCTC','MonthlyGross','MonthlyNet'];
  const q=v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
  const lines=[head.join(',')];
  emps().forEach(e=>{const c=compute(e);lines.push([e.empCode,q(e.name),e.gender||'',e.dob||'',e.doj||'',q(deptName(e.dept)),q(e.role||''),lookupName('grade',e.grade),lookupName('category',e.category),lookupName('skill',e.skill),e.plant,q(contractorName(e.contractor)),q(e.state),lookupName('country',e.country),lookupName('stateM',e.stateCode),lookupName('city',e.cityCode),e.pan,q(e.aadhaar||''),e.uan,e.sapCode||'',e.mobile||'',e.email||'',q(bankName(e.bankId)),e.bankAcc||'',e.ifsc||'',e.ctc,c.gross,c.net].join(','));});
  const blob=new Blob([lines.join('\n')],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='employees.csv';a.click();URL.revokeObjectURL(url);
  toast('Exported '+emps().length+' employees as CSV');
}

function regRowHTML(e){const c=compute(e);return `<tr><td>${empCell(e)}</td><td>${e.state}</td><td class="num">${c.att.paid}/${c.att.total}</td><td class="num">${inr(c.eBasic)}</td><td class="num">${inr(c.eHra)}</td><td class="num">${inr(c.eSpecial)}</td><td class="num" style="font-weight:600">${inr(c.eGross)}</td><td class="num">${c.eePF?inr(c.eePF):'\u2014'}</td><td class="num">${c.eeESI?inr(c.eeESI):'\u2014'}</td><td class="num">${c.pt?inr(c.pt):'\u2014'}</td><td class="num">${c.tds?inr(c.tds):'\u2014'}</td><td class="num" style="font-weight:700">${inr(c.net)}</td></tr>`;}
function regSlice(){const all=emps();const q=(state.regQ||'').toLowerCase();const filtered=q?all.filter(e=>(e.name+' '+(e.empCode||'')+' '+e.state).toLowerCase().includes(q)):all;const size=state.pageSize||25;const pages=Math.max(1,Math.ceil(filtered.length/size));let pg=Math.min(Math.max(1,state.regPg||1),pages);state.regPg=pg;const rows=filtered.slice((pg-1)*size,(pg-1)*size+size);return {rowsHtml:rows.length?rows.map(regRowHTML).join(''):'<tr><td colspan="12" style="color:var(--steel)">No matching employees.</td></tr>',pagerHtml:pagerCtrl(pg,pages,filtered.length,'gotoReg')};}
function renderRegTable(){const sl=regSlice();const r=document.getElementById('regRows');if(r)r.innerHTML=sl.rowsHtml;const p=document.getElementById('regPager');if(p)p.innerHTML=sl.pagerHtml;}
function filterReg(){const i=document.getElementById('regSrch');state.regQ=i?i.value:'';state.regPg=1;renderRegTable();}
function gotoReg(n){state.regPg=n;renderRegTable();}

/* ============================ BOOT ============================ */
renderLoginDemo();
</script>
